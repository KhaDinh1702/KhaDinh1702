name: Generate snake animation

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Generate snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: KhaDinh1702
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#ff4d4d&color_dots=#0d0303,#3a0909,#7f1111,#c83a3a,#ff4d4d
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#ff4d4d&color_dots=#0d0303,#3a0909,#7f1111,#c83a3a,#ff4d4d

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
